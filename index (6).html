className:"btn-primary disabled:opacity-40 disabled:cursor-not-allowed"},"Get My Partner Link ",React.createElement(p,null))),React.createElement("p",{className:"md:col-span-2 text-charcoal/60 text-xs leading-relaxed"},"By joining, you agree to our Partner Terms \u2014 including FTC disclosure language we provide. No quotas, no cost to join. W-9 collected automatically before your first payout."))))),React.createElement(x,null))}var I=[{q:"Tell me what you actually do.",a:"We are your personal car valet. You tell us what you want to drive \u2014 make, model, budget, timing. We do the rest. We source the vehicle, negotiate the price, compile the paperwork, and deliver the car to your driveway. You never set foot in a dealership. You hand over your time at the beginning and your keys at the end. That's the entire transaction."},{q:"How is this different from going to a dealer?",a:"A dealer's job is to sell you what's on their lot at the price they want. Our job is the opposite \u2014 to find you the best car for your needs at the best terms in our network. We work for you, not for them. They have one inventory. We shop ten dealers for you instead of you shopping one."},{q:"How is this different from a \u201Ccar concierge\u201D service?",a:"Most of them charge you $900 to $1,200 up front before they do anything. We don't charge you a cent. They review your needs and connect you to a dealer. We do the entire thing \u2014 sourcing, negotiating, paperwork, delivery \u2014 and you only meet us when we hand you the keys."},{q:"Are you a broker?",a:"Technically yes \u2014 and that's a feature, not a bug. We have the licensing, the dealer relationships, and the regulatory standing of a traditional auto broker. That's how we actually move the deal. The experience we deliver, though, is concierge: we work for you, never the dealership; you never set foot on a lot; the car comes to your door. Pure concierges without broker credentials sometimes can't close a deal. Pure brokers without concierge polish make it feel transactional. We do both at once \u2014 which is why the service feels effortless and the deal actually happens."},{q:"Is this just for luxury cars?",a:"No. We do every car at every price point. New, used, lease, finance \u2014 every combination. The car doesn't change the service; the service is white-glove whether we're delivering a $25,000 hatchback or a $250,000 coupe. The day's the same. The driveway's the same. The handoff feels the same."},{q:"What does it cost me?",a:"Nothing. Zero. No retainer, no membership, no fee. We're paid by the dealer when the deal closes \u2014 the same model that lets a buyer's real-estate agent work for the buyer without charging them. If anyone tells you that you need to pay them up front to find you a car, they're not on your side. They're on theirs."},{q:"Will I actually save money?",a:"Almost always \u2014 but we won't quote you a number we can't back up. Some services advertise that they save customers a specific dollar amount (\u201C$4,000 average!\u201D, \u201C$5,000 every time!\u201D). Ask them for the math. We save you money in three real ways: by getting you a fair money factor and residual instead of a marked-up one; by stripping out the add-ons you didn't ask for; and by negotiating across multiple dealers in our network instead of you negotiating against one. On rare deals where the dealer's posted price is already excellent, we'll tell you to take it. We won't manufacture a savings number to justify our existence."},{q:"The Deal Check \u2014 is that really free too?",a:"Yes. Upload your existing dealer quote. A trained human \u2014 not an algorithm \u2014 reviews it within 24 hours and tells you exactly what you're really paying: the true out-the-door cost, the money factor (your effective interest rate), the residual, the fees the dealer is hoping you won't ask about, and the rebates and incentives that might apply. If we can beat it, we'll show you how. If we can't, we'll tell you. Most services that do exactly this charge $99 to $200. We don't."},{q:"What if I already have a better price somewhere else?",a:"Send us the quote. Same Deal Check process \u2014 human review within 24 hours. If we can match it or beat it, we will. If we can't, we'll tell you. And if it's genuinely a great deal that we can't improve on, we'll tell you that too \u2014 and recommend you take it. We'd rather you trust us than win this one transaction. The next car, you'll come back. The car after that, you'll send your friend."},{q:"How long does this take?",a:"Six questions to start the process. Sixty seconds for you. We're back to you within four business hours with a real person on the phone. Most deals close in two to seven days. Most deliveries happen within ten days of the day you say yes."},{q:"Where do you serve?",a:"We operate primarily across the Tri-State area and the East Coast, but we source vehicles nationally. If the car you want is in Texas, we'll find it. If the deal requires shipping cross-country, we handle the logistics. Delivery is door-to-door, whatever the distance."},{q:"I have a trade-in. What happens to it?",a:"We get you a real number for it \u2014 not the dealer lowball you'd get walking into a showroom. The path depends on your equity position. If you owe less than the car is worth (positive equity), you have three options: roll the equity into the new deal as down payment; hand off the trade to us and receive a check for your equity (we work with wholesale buyers who pay real wholesale value \u2014 we take a small handling fee out of that price, you get the rest in a check); or sell it privately with our help. We'll tell you which path puts the most money in your pocket. If you owe more than it's worth (negative equity), we'll show you how to handle it cleanly so it doesn't surprise you in the new monthly payment."},{q:"My current lease is ending. What do I do?",a:"This is one of our favorite calls to get, because end-of-lease customers usually have three quiet wins available to them and don't know it. Option one: lease something new, often with no money down and sometimes at a monthly payment lower than the one you have now. Option two: buy out your current lease at a price that might be well below the car's market value, then drive it for years without payments. Option three: return it cleanly, walk away, and never deal with the inspection. We'll tell you which one is the win for you. Most \u201Clease return\u201D services charge for this analysis. We don't."},{q:"Is my information safe?",a:"Yes. Our intake form asks for your name, email, phone, and what you want to drive. That's it. We don't collect your Social Security number, your driver's license, or your employer details until we're ready to submit your final application to the dealer's lender \u2014 and at that point you'll receive a private secure portal, not an open web form. Compare our intake page to any dealership's \u201Ccredit application\u201D and you'll see what we mean."},{q:"Where's the catch?",a:"There isn't one. If there were, we'd put it here. The model works because volume works for us, and service quality keeps the volume coming. Every deal we deliver well becomes referrals. Every customer who tells a friend earns $150. That's the catch, if you want to call it one: we'd really love it if you sent us a friend."},{q:"Can I earn money by referring friends?",a:"Yes \u2014 and we hope you will. Every customer is automatically enrolled in our partner program the day they take delivery. You earn $150 every time you send us a friend who closes a deal. If you're particularly good at it, you can recruit other partners and earn $50 on every deal they close \u2014 for the next 36 months. No cost to join. No quotas. No fine print. Lease through us and you're already in \u2014 your unique link arrives with your welcome email."}];function P({items:a,startIndex:s=0}){let[e,l]=m(null);return React.createElement("div",{className:"max-w-[10
